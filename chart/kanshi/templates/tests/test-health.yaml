apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kanshi.fullname" . }}-test-health"
  labels:
    {{- include "kanshi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command:
        - wget
        - --spider
        - --timeout=5
        - http://{{ include "kanshi.fullname" . }}:{{ .Values.health.port }}/healthz
