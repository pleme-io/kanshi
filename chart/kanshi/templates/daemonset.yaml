apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kanshi.fullname" . }}
  labels:
    {{- include "kanshi.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kanshi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kanshi.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kanshi.serviceAccountName" . }}
      hostPID: true
      containers:
        - name: kanshi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --health-addr=0.0.0.0:{{ .Values.health.port }}
            - --metrics-port={{ .Values.metrics.port }}
            - --enforcement-mode={{ .Values.enforcement.mode }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: debug
              mountPath: /sys/kernel/debug
              readOnly: true
      volumes:
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
