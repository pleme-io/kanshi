apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kanshi.fullname" . }}
  labels:
    {{- include "kanshi.labels" . | nindent 4 }}
rules:
  # Watch SignatureGate CRDs for hash map population
  - apiGroups: ["sekiban.pleme.io"]
    resources: ["signaturegates", "certifications"]
    verbs: ["get", "list", "watch"]
  # Read pod specs for cgroup-to-namespace mapping
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps for revocation list updates
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Create events for integrity violations
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election (coordination)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
